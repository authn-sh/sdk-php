name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  notify-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_API_TOKEN" ]; then
            echo "Packagist credentials not configured — relying on GitHub auto-update hook."
            exit 0
          fi
          curl -fsSL -XPOST \
            -H "content-type:application/json" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/authn-sh/sdk-php"}}'
